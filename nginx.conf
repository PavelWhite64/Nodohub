events {}
http {
  # HTTP: www -> https://nodohub.ru
  server {
    listen 80;
    server_name www.nodohub.ru;
    return 301 https://nodohub.ru$request_uri;
  }

  # HTTP: голый домен -> https
  server {
    listen 80;
    server_name nodohub.ru;
    return 301 https://$host$request_uri;
  }

  # HTTPS: www -> голый домен
  server {
    listen 443 ssl;
    server_name www.nodohub.ru;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://nodohub.ru$request_uri;
  }

  # HTTPS: основной сайт
  server {
    listen 443 ssl;
    server_name nodohub.ru;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri.html $uri/ =404;
    }
  }
}
