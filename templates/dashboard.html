<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Редактор визитки — Nodohub</title>
  <style>
    :root{ --bg:#faf9f6;--text:#2b2b2b;--muted:#6b6b6b;--accent:#c7512e;--border:#e0ded8; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--text);
      font-size:17px;font-weight:300;line-height:1.6;
      -webkit-font-smoothing:antialiased;
      padding:40px 24px;max-width:720px;margin:0 auto;
    }
    h1{font-weight:400;font-size:32px;letter-spacing:-0.5px;margin-bottom:8px}
    .back-link{float:right;font-size:14px;color:var(--accent);text-decoration:none;margin-top:8px}
    .card{
      background:#fff;border:1px solid var(--border);border-radius:12px;
      padding:40px;margin-top:32px;
    }
    .field{margin-bottom:28px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;letter-spacing:0.2px}
    .field input, .field textarea{
      width:100%;padding:12px 16px;background:transparent;border:1px solid var(--border);
      font-family:inherit;font-size:16px;color:var(--text);transition:border-color .2s;outline:none;
    }
    .field input:focus, .field textarea:focus{border-color:var(--accent)}
    .field textarea{min-height:80px;resize:vertical}
    .btn{
      display:inline-block;padding:14px 32px;border:1px solid var(--accent);color:var(--accent);
      font-size:15px;font-weight:400;background:transparent;cursor:pointer;
      transition:background .2s,color .2s;text-align:center;width:auto;margin:0 auto;
    }
    .btn-wrapper{text-align:center;margin-top:8px;}
    .btn:hover{background:var(--accent);color:#fff}
    .success{background:#e6f7e6;color:#2b2b2b;padding:12px 16px;border-radius:8px;margin-top:20px}
    .error{background:#fde8e8;color:#a12b2b;padding:12px 16px;border-radius:8px;margin-top:20px}
    .preview-link{display:block;margin-top:16px;font-size:14px;color:var(--accent)}
    hr.divider{border:0;height:1px;background:var(--border);margin:24px 0 32px 0;}

    .avatar-section {
        display: flex; align-items: center; gap: 24px; margin-bottom: 28px; padding: 16px;
        border: 2px dashed var(--border); border-radius: 12px; transition: border-color .2s;
    }
    .avatar-section:hover { border-color: var(--accent); }
    .avatar-preview {
        width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--border);
        overflow: hidden; flex-shrink: 0; background: #f5f5f5;
        display: flex; align-items: center; justify-content: center;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-preview svg { width: 100%; height: 100%; }
    .avatar-upload { flex: 1; }
    .avatar-upload label.upload-btn {
        display: inline-block; padding: 10px 20px; border: 1px solid var(--accent);
        color: var(--accent); font-size: 14px; cursor: pointer;
        transition: background .2s, color .2s; margin-bottom: 8px; border-radius: 4px;
    }
    .avatar-upload label.upload-btn:hover { background: var(--accent); color: #fff; }
    .avatar-upload input[type="file"] { display: none; }
    .avatar-hint { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

    {{ toggle_css | safe }}
  </style>
</head>
<body>
  <a href="/account" class="back-link">← В кабинет</a>
  <h1>{{ user.name }}</h1>
  <hr class="divider">
  {% if error %}<div class='error'>{{ error }}</div>{% endif %}
  {% if saved %}<div class='success'>Страница обновлена! <a class='preview-link' href='/{{ page.username }}.html'>Посмотреть</a></div>{% endif %}

  <form method="post" enctype="multipart/form-data" class="card">
    <div class="field">
      <label>Аватар</label>
      <div class="avatar-section">
        {% if avatar_url %}
        <div class="avatar-preview"><img src="{{ avatar_url }}" alt="Аватар"></div>
        {% else %}
        <div class="avatar-preview">
          <svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
            <rect width="140" height="140" fill="#e8e5df"/>
            <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="42" font-weight="300" fill="#2b2b2b">{{ avatar_initial }}</text>
          </svg>
        </div>
        {% endif %}
        <div class="avatar-upload">
          <label class="upload-btn" for="avatar-input">Выбрать фото</label>
          <input id="avatar-input" type="file" name="avatar" accept="image/png, image/jpeg, image/webp">
          <div class="avatar-hint">Рекомендуется 300×300 px<br>PNG, JPG или WebP, до 2 МБ</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Адрес вашей страницы</label>
      <div style="padding:12px 16px;background:#f5f5f5;border-radius:4px;">{{ page.username }}</div>
      <input type="hidden" name="username" value="{{ page.username }}">
    </div>

    <div class="field">
      <label>Имя</label>
      <input type="text" name="name" value="{{ user.name }}" required placeholder="Анна Соколова">
    </div>

    <div class="field">
      <label>Роль</label>
      <input type="text" name="role" value="{{ page.role or '' }}" placeholder="Продуктовый дизайнер">
    </div>

    <div class="field">
      <label>О себе</label>
      <textarea name="bio" placeholder="Создаю интерфейсы...">{{ page.bio or '' }}</textarea>
    </div>

    <div aria-live="polite">
      {{ link_fields | safe }}
    </div>

    <div class="btn-wrapper">
      <button type="submit" class="btn">Сохранить страницу</button>
    </div>
  </form>
</body>
</html>
