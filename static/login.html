<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — Nodohub</title>
<style>
:root{
  --bg:#faf9f6;--text:#2b2b2b;--muted:#6b6b6b;--icon:#8b8b8b;
  --accent:#c7512e;--border:#e0ded8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:17px;font-weight:300;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 24px;
}
.card{
  width:100%;max-width:420px;
  text-align:center;
}
.logo{font-size:28px;font-weight:400;color:var(--text);margin-bottom:8px}
.logo .dot{color:var(--accent)}
h1{font-size:28px;font-weight:400;margin-bottom:32px;letter-spacing:-0.3px}
.form{text-align:left;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{
  display:block;font-size:13px;color:var(--muted);
  margin-bottom:8px;letter-spacing:0.2px;
}
.field input{
  width:100%;padding:14px 16px;
  background:transparent;border:1px solid var(--border);
  font-family:inherit;font-size:16px;color:var(--text);
  transition:border-color .2s;outline:none;
}
.field input:focus{border-color:var(--accent)}
.btn{
  display:inline-block;padding:14px 32px;
  border:1px solid var(--accent);color:var(--accent);
  font-size:15px;font-weight:400;background:transparent;
  cursor:pointer;transition:background .2s,color .2s;
  width:100%;text-align:center;
}
.btn:hover{background:var(--accent);color:#fff}
.register-link{font-size:14px;color:var(--muted);margin-top:16px}
.register-link a{color:var(--accent);text-decoration:none}
.register-link a:hover{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Nodohub<span class="dot">.</span></div>
  <h1>Войдите в аккаунт</h1>
  <form class="form" action="/auth/login" method="post">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" placeholder="Минимум 8 символов" required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>
  <p class="register-link">Нет аккаунта? <a href="/">Зарегистрироваться</a></p>
</div>
</body>
</html>
