<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Личный кабинет — Nodohub</title>
  <style>
    :root{ --bg:#faf9f6;--text:#2b2b2b;--muted:#6b6b6b;--accent:#c7512e;--border:#e0ded8; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--text);
      font-size:17px;font-weight:300;line-height:1.6;
      -webkit-font-smoothing:antialiased;
      padding:40px 24px;max-width:720px;margin:0 auto;
    }
    h1{font-weight:400;font-size:32px;letter-spacing:-0.5px;margin-bottom:8px}
    .logout{float:right;font-size:14px;color:var(--accent);text-decoration:none;margin-top:8px}
    .card{
      background:#fff;border:1px solid var(--border);border-radius:12px;
      padding:32px;margin-top:32px;
    }
    .field{margin-bottom:20px}
    .field label{
      display:block;font-size:13px;color:var(--muted);
      margin-bottom:8px;letter-spacing:0.2px;
    }
    .field input, .field textarea{
      width:100%;padding:12px 16px;
      background:transparent;border:1px solid var(--border);
      font-family:inherit;font-size:16px;color:var(--text);
      transition:border-color .2s;outline:none;
    }
    .field input:focus, .field textarea:focus{border-color:var(--accent)}
    .field textarea{min-height:80px;resize:vertical}
    .field .featured-check{display:flex;align-items:center;gap:8px;margin-top:8px}
    .btn{
      display:inline-block;padding:12px 28px;
      border:1px solid var(--accent);color:var(--accent);
      font-size:15px;font-weight:400;background:transparent;
      cursor:pointer;transition:background .2s,color .2s;
      text-align:center;width:100%;
    }
    .btn:hover{background:var(--accent);color:#fff}
    .success{background:#e6f7e6;color:#2b2b2b;padding:12px 16px;border-radius:8px;margin-top:20px}
    .error{background:#fde8e8;color:#a12b2b;padding:12px 16px;border-radius:8px;margin-top:20px}
    .preview-link{display:block;margin-top:16px;font-size:14px;color:var(--accent)}
  </style>
</head>
<body>
  <a href="/logout" class="logout">Выйти</a>
  <h1>{{ user.name }}</h1>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  {% if saved %}
  <div class="success">Страница обновлена! <a class="preview-link" href="/{{ username }}.html">Посмотреть</a></div>
  {% endif %}

  <form method="post" class="card">
    <div class="field">
      <label for="username">Username (адрес вашей страницы)</label>
      <input type="text" id="username" name="username" value="{{ page.username }}" required placeholder="anna">
    </div>
    <div class="field">
      <label for="name">Имя</label>
      <input type="text" id="name" name="name" value="{{ user.name }}" required placeholder="Анна Соколова">
    </div>
    <div class="field">
      <label for="role">Роль</label>
      <input type="text" id="role" name="role" value="{{ page.role or '' }}" placeholder="Продуктовый дизайнер">
    </div>
    <div class="field">
      <label for="bio">О себе</label>
      <textarea id="bio" name="bio" placeholder="Создаю интерфейсы, которые уважают человека...">{{ page.bio or '' }}</textarea>
    </div>

    {% for i in range(5) %}
    <div class="field">
      <label>Ссылка {{ i+1 }}</label>
      <input type="text" name="link_title_{{ i }}" placeholder="Название" value="{{ links[i]['title'] if i < links|length else '' }}">
      <input type="url" name="link_url_{{ i }}" placeholder="https://..." value="{{ links[i]['url'] if i < links|length else '' }}" style="margin-top:8px">
      <div class="featured-check">
        <input type="checkbox" name="link_featured_{{ i }}" id="featured_{{ i }}" {% if links[i]['featured'] %}checked{% endif %}>
        <label for="featured_{{ i }}">Главная ссылка</label>
      </div>
    </div>
    {% endfor %}

    <button type="submit" class="btn">Сохранить страницу</button>
  </form>
</body>
</html>
